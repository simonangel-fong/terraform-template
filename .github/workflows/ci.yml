name: ci

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

env:
  TERRAFORM_VERSION: "1.9.8"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v7
      - id: find
        name: Discover modules
        shell: bash
        run: |
          # A module = a directory at <cloud>/<name>/ that contains at least one .tf file.
          # Using shell globs (not `find -maxdepth`) because find counts depth from each
          # start path, so `find azure -maxdepth 2` would also match azure/aks/tests/.
          shopt -s nullglob
          mods=()
          for dir in aws/*/ azure/*/ gcp/*/; do
            dir="${dir%/}"
            tf_files=( "$dir"/*.tf )
            if [ ${#tf_files[@]} -gt 0 ]; then
              mods+=( "$dir" )
            fi
          done
          if [ ${#mods[@]} -eq 0 ]; then
            echo "modules=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${mods[@]}" | jq -R . | jq -sc .)
            echo "modules=$json" >> "$GITHUB_OUTPUT"
          fi
          printf 'Discovered: %s\n' "${mods[@]}"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - run: terraform fmt -check -recursive

  validate:
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: init
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false
      - name: validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

  test:
    needs: [discover, validate]
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Skip if no tests
        id: check
        shell: bash
        run: |
          if compgen -G "${{ matrix.module }}/tests/*.tftest.hcl" > /dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No tftest.hcl files in ${{ matrix.module }}/tests — skipping."
          fi
      - name: init
        if: steps.check.outputs.has_tests == 'true'
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false
      - name: test
        if: steps.check.outputs.has_tests == 'true'
        working-directory: ${{ matrix.module }}
        run: terraform test -verbose

  tflint:
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
      - name: tflint init
        working-directory: ${{ matrix.module }}
        run: tflint --init
      - name: tflint
        working-directory: ${{ matrix.module }}
        run: tflint --recursive

  docs:
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7
      - name: terraform-docs (regenerate in place)
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: ${{ matrix.module }}
          config-file: .terraform-docs.yml
          output-file: README.md
          output-method: inject
          recursive: false
          fail-on-diff: false
          git-push: false
      - name: Fail if README is stale
        shell: bash
        working-directory: ${{ matrix.module }}
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error::README.md in ${{ matrix.module }} is out of date."
            echo "::error::Run 'terraform-docs .' in ${{ matrix.module }} and commit the result."
            exit 1
          fi

